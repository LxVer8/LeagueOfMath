<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoL Arena Stat Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0e14; color: #e0e0e0; height: 100vh; overflow: hidden; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: 1fr; height: 100vh; gap: 8px; padding: 8px; }
    .section { background: #1a1e26; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .section h2 { font-size: 0.95rem; margin-bottom: 6px; color: #c8aa6e; text-align: center; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    .champion-section { grid-column: 1 / 2; grid-row: 1 / 2; }
    .items-section    { grid-column: 2 / 3; grid-row: 1 / 2; }
    .augments-section { grid-column: 3 / 4; grid-row: 1 / 2; }
    .stats-section    { grid-column: 4 / 5; grid-row: 1 / 2; overflow-y: auto; }
    .selection-grid { display: flex; flex-wrap: wrap; gap: 6px; overflow-y: auto; align-content: flex-start; flex: 1; min-height: 0; }
    .selection-item { width: 52px; height: 52px; border: 2px solid transparent; border-radius: 6px; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; flex-shrink: 0; }
    .selection-item:hover { border-color: #c8aa6e; }
    .selection-item.selected { border-color: #f0e6d2; background: rgba(200, 170, 110, 0.25); }
    .selection-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }

    /* Tooltip styling */
    .tooltip {
      display: none;
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e24;
      color: #f0e6d2;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      white-space: normal;
      width: 220px;
      word-wrap: break-word;
      z-index: 100;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      text-align: left;
    }
    .selection-item:hover .tooltip { display: block; }

    .tooltip strong {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 3px;
      color: #f0e6d2;
      font-weight: 700;
    }

    .search-input { width: 100%; padding: 6px 10px; margin-bottom: 8px; background: #2a2e38; border: 1px solid #444; border-radius: 4px; color: #e0e0e0; font-size: 0.85rem; outline: none; }
    .search-input::placeholder { color: #888; }
    .search-input:focus { border-color: #c8aa6e; }

    .stats-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 1.1rem; }
    .stats-table td { padding: 6px 8px; border-bottom: 1px solid #2a2e38; }
    .stats-table td:first-child { font-weight: bold; color: #c8aa6e; }
    .stats-table td:last-child { text-align: right; color: #ffffff; }
    .stats-table td:last-child.modified { color: #f0e68c; }

    .stat-icon { width: 20px; height: 20px; vertical-align: middle; margin-right: 4px; }
    .level-input-container { display: flex; align-items: center; justify-content: center; margin: 6px 0; }
    .level-input-container input { width: 55px; padding: 4px; background: #2a2e38; border: 1px solid #444; border-radius: 4px; color: #e0e0e0; text-align: center; }
    .selection-grid::-webkit-scrollbar, .stats-section::-webkit-scrollbar { width: 6px; }
    .selection-grid::-webkit-scrollbar-track, .stats-section::-webkit-scrollbar-track { background: #111; border-radius: 3px; }
    .selection-grid::-webkit-scrollbar-thumb, .stats-section::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    .hotbar { display: flex; gap: 4px; min-height: 36px; margin-bottom: 6px; padding: 3px; background: #0f1219; border-radius: 6px; align-items: center; }
    .hotbar-slot { width: 32px; height: 32px; border: 2px dashed #333; border-radius: 4px; position: relative; background: #111; }
    .hotbar-slot.filled { border: 2px solid #555; cursor: pointer; }
    .hotbar-slot.filled:hover { border-color: #c8aa6e; }
    .hotbar-slot img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; }
    .hotbar-slot .remove-x { display: none; position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; background: #c0392b; border-radius: 50%; color: #fff; font-size: 10px; line-height: 16px; text-align: center; }
    .hotbar-slot.filled:hover .remove-x { display: block; }
  </style>
</head>
<body>
  <div class="main-grid">
    <div class="section champion-section">
      <h2>Pick a Champion</h2>
      <input type="text" class="search-input" id="championSearch" placeholder="Search champions…">
      <div class="level-input-container">
        <label for="levelInput">Level:</label>
        <input type="number" id="levelInput" value="1" min="1" max="18">
      </div>
      <div class="selection-grid" id="championGrid"><p style="color:#aaa; text-align:center;">Loading…</p></div>
    </div>
    <div class="section items-section">
      <h2>Pick Items (max 6)</h2>
      <input type="text" class="search-input" id="itemSearch" placeholder="Search items…">
      <div class="hotbar" id="selectedItemsBar"></div>
      <div class="selection-grid" id="itemGrid"><p style="color:#aaa; text-align:center;">Loading…</p></div>
    </div>
    <div class="section augments-section">
      <h2>Pick Augments (max 6)</h2>
      <input type="text" class="search-input" id="augmentSearch" placeholder="Search augments…">
      <div class="hotbar" id="selectedAugmentsBar"></div>
      <div class="selection-grid" id="augmentGrid"><p style="color:#aaa; text-align:center;">Loading…</p></div>
    </div>
    <div class="section stats-section">
      <h2>Full Stats</h2>
      <table class="stats-table" id="statsTable"><tr><td colspan="2">Select a champion</td></tr></table>
    </div>
  </div>

  <script>
    (function() {
      const state = { selectedChampion: null, selectedItems: new Set(), selectedAugments: new Set(), level: 1 };
      const MAX_SELECTIONS = 6;
      let championsData = {}, itemsData = {}, augments = [], ddVersion = '';

      const championGrid = document.getElementById('championGrid');
      const itemGrid = document.getElementById('itemGrid');
      const augmentGrid = document.getElementById('augmentGrid');
      const selectedItemsBar = document.getElementById('selectedItemsBar');
      const selectedAugmentsBar = document.getElementById('selectedAugmentsBar');
      const levelInput = document.getElementById('levelInput');
      const statsTable = document.getElementById('statsTable');
      const championSearch = document.getElementById('championSearch');
      const itemSearch = document.getElementById('itemSearch');
      const augmentSearch = document.getElementById('augmentSearch');

      const statIcons = {
        'Health': 'https://wiki.leagueoflegends.com/en-us/images/Health_icon.png',
        'Mana': 'https://wiki.leagueoflegends.com/en-us/images/Mana_icon.png',
        'Health Regen': 'https://wiki.leagueoflegends.com/en-us/images/Health_regeneration_icon.png',
        'Mana Regen': 'https://wiki.leagueoflegends.com/en-us/images/Mana_regeneration_icon.png',
        'Armor': 'https://wiki.leagueoflegends.com/en-us/images/Armor_icon.png',
        'Magic Resist': 'https://wiki.leagueoflegends.com/en-us/images/Magic_resistance_icon.png',
        'Attack Damage': 'https://wiki.leagueoflegends.com/en-us/images/Attack_damage_icon.png',
        'Ability Power': 'https://wiki.leagueoflegends.com/en-us/images/Ability_power_icon.svg?c0f6c',
        'Attack Speed': 'https://wiki.leagueoflegends.com/en-us/images/Attack_speed_icon.png',
        'Ability Haste': 'https://wiki.leagueoflegends.com/en-us/images/thumb/Cooldown_reduction_icon.png/15px-Cooldown_reduction_icon.png?27276',
        'Crit Chance': 'https://wiki.leagueoflegends.com/en-us/images/Critical_strike_chance_icon.png',
        'Lethality': 'https://wiki.leagueoflegends.com/en-us/images/Armor_penetration_icon.png',
        'Flat Magic Pen': 'https://wiki.leagueoflegends.com/en-us/images/Magic_penetration_icon.png',
        '% Magic Pen': 'https://wiki.leagueoflegends.com/en-us/images/Magic_penetration_icon.png',
        'Flat Armor Pen': 'https://wiki.leagueoflegends.com/en-us/images/Armor_penetration_icon.png',
        '% Armor Pen': 'https://wiki.leagueoflegends.com/en-us/images/Armor_penetration_icon.png',
        'Heal & Shield Power': 'https://wiki.leagueoflegends.com/en-us/images/Heal_and_shield_power_icon.png',
        'Life Steal': 'https://wiki.leagueoflegends.com/en-us/images/Life_steal_icon.png',
        'Spell Vamp': 'https://wiki.leagueoflegends.com/en-us/images/Spell_vamp_icon.png',
        'Omnivamp': 'https://wiki.leagueoflegends.com/en-us/images/Omnivamp_icon.png',
        'Move Speed': 'https://wiki.leagueoflegends.com/en-us/images/Movement_speed_icon.png',
        '% Move Speed': 'https://wiki.leagueoflegends.com/en-us/images/Movement_speed_icon.png',
        'Attack Range': 'https://wiki.leagueoflegends.com/en-us/images/thumb/Range_icon.png/15px-Range_icon.png?ae16f',
        'Tenacity': 'https://wiki.leagueoflegends.com/en-us/images/Tenacity_icon.png',
        'Slow Resist': 'https://wiki.leagueoflegends.com/en-us/images/thumb/Slow_immune_icon.png/15px-Slow_immune_icon.png?4ad41'
      };

      async function loadData() {
        try {
          const versionsRes = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
          if (!versionsRes.ok) throw new Error('Version fetch failed');
          const versions = await versionsRes.json();
          ddVersion = versions[0];
          const [champsRes, itemsRes] = await Promise.all([
            fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/en_US/champion.json`),
            fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/en_US/item.json`)
          ]);
          if (!champsRes.ok || !itemsRes.ok) throw new Error('Data fetch failed');
          championsData = (await champsRes.json()).data;
          itemsData = (await itemsRes.json()).data;
          try { const augRes = await fetch('augments.json'); if (augRes.ok) augments = await augRes.json(); } catch(e) { augments = []; }
          renderAll();
        } catch (error) {
          console.error(error);
          championGrid.innerHTML = '<p style="color:red;">Failed to load.</p>';
          itemGrid.innerHTML = '<p style="color:red;">Failed to load.</p>';
        }
      }

      function renderAll() {
        renderChampions();
        renderItems();
        renderAugments();
        updateSelectedItemsBar();
        updateSelectedAugmentsBar();
        calculateStats();
      }

      function renderChampions() {
        championGrid.innerHTML = '';
        Object.entries(championsData).forEach(([key, champ]) => {
          const div = document.createElement('div');
          div.className = 'selection-item';
          div.dataset.championKey = key;
          const img = document.createElement('img');
          img.src = `https://ddragon.leagueoflegends.com/cdn/${ddVersion}/img/champion/${key}.png`;
          img.alt = champ.name;
          img.onerror = () => { img.remove(); div.textContent = champ.name.charAt(0); };
          div.appendChild(img);
          if (state.selectedChampion === key) div.classList.add('selected');
          div.addEventListener('click', () => selectChampion(key, div));
          championGrid.appendChild(div);
        });
      }

      function renderItems() {
        itemGrid.innerHTML = '';
        Object.entries(itemsData)
          .filter(([id, item]) => item.gold?.total > 0 && !(item.tags || []).some(t => ['Trinket','Consumable','GoldPer'].includes(t)))
          .forEach(([id, item]) => {
            const div = document.createElement('div');
            div.className = 'selection-item';
            div.dataset.itemId = id;
            const img = document.createElement('img');
            img.src = `https://ddragon.leagueoflegends.com/cdn/${ddVersion}/img/item/${id}.png`;
            img.alt = item.name;
            img.onerror = () => { img.remove(); div.textContent = item.name.charAt(0); };
            div.appendChild(img);

            // --- Tooltip with name + description ---
            const tooltip = document.createElement('span');
            tooltip.className = 'tooltip';
            // Use plaintext (short desc) if available, otherwise empty
            const desc = item.plaintext || '';
            tooltip.innerHTML = `<strong>${item.name}</strong>${desc}`;
            div.appendChild(tooltip);

            if (state.selectedItems.has(id)) div.classList.add('selected');
            div.addEventListener('click', () => toggleItem(id, div));

            // Smart tooltip positioning (same as augments)
            div.addEventListener('mouseenter', () => {
              const gridRect = itemGrid.getBoundingClientRect();
              const iconRect = div.getBoundingClientRect();
              const tw = 220, pad = 4;
              let left = iconRect.left + iconRect.width/2 - tw/2;
              left = Math.min(Math.max(left, gridRect.left + pad), gridRect.right - tw - pad);
              tooltip.style.left = (left - iconRect.left) + 'px';
              tooltip.style.transform = 'none';
            });
            div.addEventListener('mouseleave', () => {
              tooltip.style.left = '50%';
              tooltip.style.transform = 'translateX(-50%)';
            });

            itemGrid.appendChild(div);
          });
      }

      function renderAugments() {
        augmentGrid.innerHTML = '';
        if (augments.length === 0) {
          augmentGrid.innerHTML = '<p style="color:orange;">No augment data.</p>';
          return;
        }
        augments.forEach((aug, idx) => {
          const div = document.createElement('div');
          div.className = 'selection-item';
          div.dataset.augmentIndex = idx;
          if (aug.icon) {
            const img = document.createElement('img');
            img.src = aug.icon;
            img.alt = aug.name;
            img.onerror = () => { img.remove(); div.textContent = aug.name.charAt(0); div.style.backgroundColor = getColor(idx); };
            div.appendChild(img);
          } else {
            div.textContent = aug.name.charAt(0);
            div.style.backgroundColor = getColor(idx);
            div.style.display = 'flex'; div.style.alignItems = 'center'; div.style.justifyContent = 'center';
            div.style.fontSize = '1.2rem'; div.style.fontWeight = 'bold';
          }

          const tooltip = document.createElement('span');
          tooltip.className = 'tooltip';
          tooltip.innerHTML = `<strong>${aug.name}</strong>${aug.desc}`;
          div.appendChild(tooltip);

          if (state.selectedAugments.has(idx)) div.classList.add('selected');
          div.addEventListener('click', () => toggleAugment(idx, div));
          div.addEventListener('mouseenter', () => {
            const gridRect = augmentGrid.getBoundingClientRect();
            const iconRect = div.getBoundingClientRect();
            const tw = 220, pad = 4;
            let left = iconRect.left + iconRect.width/2 - tw/2;
            left = Math.min(Math.max(left, gridRect.left + pad), gridRect.right - tw - pad);
            tooltip.style.left = (left - iconRect.left) + 'px';
            tooltip.style.transform = 'none';
          });
          div.addEventListener('mouseleave', () => {
            tooltip.style.left = '50%';
            tooltip.style.transform = 'translateX(-50%)';
          });
          augmentGrid.appendChild(div);
        });
      }

      function getColor(i) { return ['#3c5a77','#5e4b3c','#2e5a4b','#6b4e5a','#4a6e5f'][i%5]; }

      function updateSelectedItemsBar() {
        selectedItemsBar.innerHTML = '';
        const arr = Array.from(state.selectedItems);
        for (let i = 0; i < MAX_SELECTIONS; i++) {
          const slot = document.createElement('div');
          slot.className = 'hotbar-slot';
          if (i < arr.length) {
            const id = arr[i];
            slot.classList.add('filled');
            const img = document.createElement('img');
            img.src = `https://ddragon.leagueoflegends.com/cdn/${ddVersion}/img/item/${id}.png`;
            slot.appendChild(img);
            const rm = document.createElement('span');
            rm.className = 'remove-x'; rm.textContent = '×';
            rm.addEventListener('click', (e) => { e.stopPropagation(); deselectItem(id); });
            slot.appendChild(rm);
            slot.addEventListener('click', () => deselectItem(id));
          }
          selectedItemsBar.appendChild(slot);
        }
      }

      function updateSelectedAugmentsBar() {
        selectedAugmentsBar.innerHTML = '';
        const arr = Array.from(state.selectedAugments);
        for (let i = 0; i < MAX_SELECTIONS; i++) {
          const slot = document.createElement('div');
          slot.className = 'hotbar-slot';
          if (i < arr.length) {
            const idx = arr[i];
            const aug = augments[idx];
            slot.classList.add('filled');
            if (aug.icon) {
              const img = document.createElement('img');
              img.src = aug.icon;
              slot.appendChild(img);
            } else {
              slot.style.backgroundColor = getColor(idx);
              slot.style.display = 'flex'; slot.style.alignItems = 'center'; slot.style.justifyContent = 'center';
              slot.style.fontSize = '0.7rem'; slot.style.fontWeight = 'bold';
              slot.textContent = aug.name.charAt(0);
            }
            const rm = document.createElement('span');
            rm.className = 'remove-x'; rm.textContent = '×';
            rm.addEventListener('click', (e) => { e.stopPropagation(); deselectAugment(idx); });
            slot.appendChild(rm);
            slot.addEventListener('click', () => deselectAugment(idx));
          }
          selectedAugmentsBar.appendChild(slot);
        }
      }

      function selectChampion(key, el) {
        document.querySelectorAll('#championGrid .selection-item.selected').forEach(e => e.classList.remove('selected'));
        state.selectedChampion = key;
        el.classList.add('selected');
        calculateStats();
      }

      function toggleItem(id, el) {
        if (state.selectedItems.has(id)) { state.selectedItems.delete(id); el.classList.remove('selected'); }
        else { if (state.selectedItems.size >= MAX_SELECTIONS) return; state.selectedItems.add(id); el.classList.add('selected'); }
        updateSelectedItemsBar(); calculateStats();
      }

      function toggleAugment(idx, el) {
        if (state.selectedAugments.has(idx)) { state.selectedAugments.delete(idx); el.classList.remove('selected'); }
        else { if (state.selectedAugments.size >= MAX_SELECTIONS) return; state.selectedAugments.add(idx); el.classList.add('selected'); }
        updateSelectedAugmentsBar(); calculateStats();
      }

      function deselectItem(id) {
        state.selectedItems.delete(id);
        updateSelectedItemsBar();
        const el = document.querySelector(`#itemGrid .selection-item[data-item-id="${id}"]`);
        if (el) el.classList.remove('selected');
        calculateStats();
      }

      function deselectAugment(idx) {
        state.selectedAugments.delete(idx);
        updateSelectedAugmentsBar();
        const el = document.querySelector(`#augmentGrid .selection-item[data-augment-index="${idx}"]`);
        if (el) el.classList.remove('selected');
        calculateStats();
      }

      championSearch.addEventListener('input', () => {
        const q = championSearch.value.toLowerCase();
        document.querySelectorAll('#championGrid .selection-item').forEach(el => {
          el.style.display = championsData[el.dataset.championKey]?.name.toLowerCase().includes(q) ? '' : 'none';
        });
      });
      itemSearch.addEventListener('input', () => {
        const q = itemSearch.value.toLowerCase();
        document.querySelectorAll('#itemGrid .selection-item').forEach(el => {
          el.style.display = itemsData[el.dataset.itemId]?.name.toLowerCase().includes(q) ? '' : 'none';
        });
      });
      augmentSearch.addEventListener('input', () => {
        const q = augmentSearch.value.toLowerCase();
        document.querySelectorAll('#augmentGrid .selection-item').forEach(el => {
          const idx = parseInt(el.dataset.augmentIndex);
          el.style.display = augments[idx]?.name.toLowerCase().includes(q) ? '' : 'none';
        });
      });
      levelInput.addEventListener('input', () => { state.level = parseInt(levelInput.value) || 1; calculateStats(); });

      function getBaseStat(champ, level, baseKey, growthKey) {
        const g = level - 1;
        return champ.stats[baseKey] + champ.stats[growthKey] * g * (0.7025 + 0.0175 * g);
      }

      function calculateStats() {
        if (!state.selectedChampion || !championsData[state.selectedChampion]) {
          statsTable.innerHTML = '<tr><td colspan="2">Select a champion</td></tr>';
          return;
        }
        const champ = championsData[state.selectedChampion];
        const level = state.level;

        const base = {
          health: getBaseStat(champ, level, 'hp', 'hpperlevel'),
          mana: getBaseStat(champ, level, 'mp', 'mpperlevel'),
          armor: getBaseStat(champ, level, 'armor', 'armorperlevel'),
          magicResistance: getBaseStat(champ, level, 'spellblock', 'spellblockperlevel'),
          attackDamage: getBaseStat(champ, level, 'attackdamage', 'attackdamageperlevel'),
          abilityPower: 0,
          healthRegen: getBaseStat(champ, level, 'hpregen', 'hpregenperlevel'),
          manaRegen: getBaseStat(champ, level, 'mpregen', 'mpregenperlevel'),
          attackSpeed: champ.stats.attackspeed,
          attackSpeedPerLevel: champ.stats.attackspeedperlevel / 100,
        };

        const bonuses = {
          health: 0, mana: 0, armor: 0, magicResistance: 0,
          attackDamage: 0, abilityPower: 0,
          healthRegenFlat: 0, manaRegenFlat: 0,
          attackSpeedPercent: 0,
          abilityHaste: 0,
          critChance: 0,
          lethality: 0,
          flatMagicPen: 0, percentMagicPen: 0,
          flatArmorPen: 0, percentArmorPen: 0,
          healShieldPower: 0,
          lifeSteal: 0, spellVamp: 0, omnivamp: 0,
          moveSpeedFlat: 0, moveSpeedPercent: 0,
          attackRange: 0,
          tenacity: 0, slowResist: 0,
          adaptiveForce: 0
        };

        const itemStatMap = {
          FlatHPPoolMod: 'health',
          FlatMPPoolMod: 'mana',
          FlatArmorMod: 'armor',
          FlatSpellBlockMod: 'magicResistance',
          FlatPhysicalDamageMod: 'attackDamage',
          FlatMagicDamageMod: 'abilityPower',
          FlatHPRegenMod: 'healthRegenFlat',
          FlatMPRegenMod: 'manaRegenFlat',
          PercentAttackSpeedMod: 'attackSpeedPercent',
          AbilityHaste: 'abilityHaste',
          CritChance: 'critChance',
          Lethality: 'lethality',
          FlatMagicPenetration: 'flatMagicPen',
          PercentMagicPenetration: 'percentMagicPen',
          FlatArmorPenetration: 'flatArmorPen',
          PercentArmorPenetration: 'percentArmorPen',
          HealAndShieldPower: 'healShieldPower',
          PercentLifeStealMod: 'lifeSteal',
          SpellVamp: 'spellVamp',
          Omnivamp: 'omnivamp',
          FlatMovementSpeedMod: 'moveSpeedFlat',
          PercentMovementSpeedMod: 'moveSpeedPercent',
          AttackRange: 'attackRange',
          Tenacity: 'tenacity',
          SlowResist: 'slowResist'
        };

        state.selectedItems.forEach(id => {
          const item = itemsData[id];
          if (!item?.stats) return;
          for (const [key, val] of Object.entries(item.stats)) {
            if (itemStatMap[key]) bonuses[itemStatMap[key]] += val;
          }
        });

        const augBonuses = { health:0, mana:0, armor:0, magicResistance:0, attackDamage:0, abilityPower:0, adaptiveForce:0 };
        state.selectedAugments.forEach(idx => {
          const aug = augments[idx];
          if (aug?.effects) {
            for (const [k,v] of Object.entries(aug.effects)) {
              if (augBonuses.hasOwnProperty(k)) augBonuses[k] += v;
            }
          }
        });
        bonuses.health += augBonuses.health;
        bonuses.mana += augBonuses.mana;
        bonuses.armor += augBonuses.armor;
        bonuses.magicResistance += augBonuses.magicResistance;
        bonuses.attackDamage += augBonuses.attackDamage;
        bonuses.abilityPower += augBonuses.abilityPower;
        const adaptive = augBonuses.adaptiveForce;

        let adBonus = bonuses.attackDamage;
        let apBonus = bonuses.abilityPower;
        if (adBonus > apBonus) adBonus += adaptive;
        else apBonus += adaptive;

        const final = {
          health: base.health + bonuses.health,
          mana: base.mana + bonuses.mana,
          healthRegen5: (base.healthRegen + bonuses.healthRegenFlat) * 5,
          manaRegen5: (base.manaRegen + bonuses.manaRegenFlat) * 5,
          armor: base.armor + bonuses.armor,
          magicResistance: base.magicResistance + bonuses.magicResistance,
          attackDamage: base.attackDamage + adBonus,
          abilityPower: base.abilityPower + apBonus,
          attackSpeed: base.attackSpeed * (1 + base.attackSpeedPerLevel * (level - 1) + bonuses.attackSpeedPercent),
          abilityHaste: bonuses.abilityHaste,
          critChance: bonuses.critChance,
          lethality: bonuses.lethality,
          flatMagicPen: bonuses.flatMagicPen,
          percentMagicPen: bonuses.percentMagicPen,
          flatArmorPen: bonuses.flatArmorPen,
          percentArmorPen: bonuses.percentArmorPen,
          healShieldPower: bonuses.healShieldPower,
          lifeSteal: bonuses.lifeSteal,
          spellVamp: bonuses.spellVamp,
          omnivamp: bonuses.omnivamp,
          moveSpeed: champ.stats.movespeed + bonuses.moveSpeedFlat,
          moveSpeedPercent: bonuses.moveSpeedPercent,
          attackRange: bonuses.attackRange,
          tenacity: bonuses.tenacity,
          slowResist: bonuses.slowResist
        };

        const isModified = (label) => {
          switch (label) {
            case 'Health': return final.health !== base.health;
            case 'Mana': return final.mana !== base.mana;
            case 'Health Regen': return final.healthRegen5 !== base.healthRegen * 5;
            case 'Mana Regen': return final.manaRegen5 !== base.manaRegen * 5;
            case 'Armor': return final.armor !== base.armor;
            case 'Magic Resist': return final.magicResistance !== base.magicResistance;
            case 'Attack Damage': return final.attackDamage !== base.attackDamage;
            case 'Ability Power': return final.abilityPower !== 0;
            case 'Attack Speed':
              const baseAS = base.attackSpeed * (1 + base.attackSpeedPerLevel * (level - 1));
              return final.attackSpeed !== baseAS;
            case 'Ability Haste': return final.abilityHaste !== 0;
            case 'Crit Chance': return final.critChance !== 0;
            case 'Lethality': return final.lethality !== 0;
            case 'Flat Magic Pen': return final.flatMagicPen !== 0;
            case '% Magic Pen': return final.percentMagicPen !== 0;
            case 'Flat Armor Pen': return final.flatArmorPen !== 0;
            case '% Armor Pen': return final.percentArmorPen !== 0;
            case 'Heal & Shield Power': return final.healShieldPower !== 0;
            case 'Life Steal': return final.lifeSteal !== 0;
            case 'Spell Vamp': return final.spellVamp !== 0;
            case 'Omnivamp': return final.omnivamp !== 0;
            case 'Move Speed': return final.moveSpeed !== champ.stats.movespeed;
            case '% Move Speed': return final.moveSpeedPercent !== 0;
            case 'Attack Range': return final.attackRange !== 0;
            case 'Tenacity': return final.tenacity !== 0;
            case 'Slow Resist': return final.slowResist !== 0;
            default: return false;
          }
        };

        const rows = [];
        function addRow(label, value, formatter, modified) {
          const iconUrl = statIcons[label] || '';
          const iconHTML = iconUrl
            ? `<img class="stat-icon" src="${iconUrl}" alt="${label}" onerror="this.style.display='none';">`
            : '';

          let display;
          if (formatter === 'percent') display = (value * 100).toFixed(1) + '%';
          else if (formatter === 'as') display = value.toFixed(3);
          else if (formatter === 'integer') display = Math.round(value);
          else if (formatter === 'flat') display = Math.round(value);
          else display = value;

          const modClass = modified ? ' class="modified"' : '';
          rows.push(`<tr><td>${iconHTML} ${label}</td><td${modClass}>${display}</td></tr>`);
        }

        addRow('Health', final.health, 'integer', isModified('Health'));
        addRow('Mana', final.mana, 'integer', isModified('Mana'));
        addRow('Health Regen', final.healthRegen5, 'integer', isModified('Health Regen'));
        addRow('Mana Regen', final.manaRegen5, 'integer', isModified('Mana Regen'));
        addRow('Armor', final.armor, 'integer', isModified('Armor'));
        addRow('Magic Resist', final.magicResistance, 'integer', isModified('Magic Resist'));
        addRow('Attack Damage', final.attackDamage, 'integer', isModified('Attack Damage'));
        addRow('Ability Power', final.abilityPower, 'integer', isModified('Ability Power'));
        addRow('Attack Speed', final.attackSpeed, 'as', isModified('Attack Speed'));
        addRow('Ability Haste', final.abilityHaste, 'integer', isModified('Ability Haste'));
        addRow('Crit Chance', final.critChance, 'percent', isModified('Crit Chance'));
        addRow('Lethality', final.lethality, 'integer', isModified('Lethality'));
        addRow('Flat Magic Pen', final.flatMagicPen, 'integer', isModified('Flat Magic Pen'));
        addRow('% Magic Pen', final.percentMagicPen, 'percent', isModified('% Magic Pen'));
        addRow('Flat Armor Pen', final.flatArmorPen, 'integer', isModified('Flat Armor Pen'));
        addRow('% Armor Pen', final.percentArmorPen, 'percent', isModified('% Armor Pen'));
        addRow('Heal & Shield Power', final.healShieldPower, 'percent', isModified('Heal & Shield Power'));
        addRow('Life Steal', final.lifeSteal, 'percent', isModified('Life Steal'));
        addRow('Spell Vamp', final.spellVamp, 'percent', isModified('Spell Vamp'));
        addRow('Omnivamp', final.omnivamp, 'percent', isModified('Omnivamp'));
        addRow('Move Speed', final.moveSpeed, 'integer', isModified('Move Speed'));
        addRow('% Move Speed', final.moveSpeedPercent, 'percent', isModified('% Move Speed'));
        addRow('Attack Range', final.attackRange, 'integer', isModified('Attack Range'));
        addRow('Tenacity', final.tenacity, 'percent', isModified('Tenacity'));
        addRow('Slow Resist', final.slowResist, 'percent', isModified('Slow Resist'));

        statsTable.innerHTML = rows.join('');
      }

      loadData();
    })();
  </script>
</body>
</html>
