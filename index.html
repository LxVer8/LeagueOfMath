<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoL Arena Stat Calculator</title>
  <style>
    /* ---------- Layout & Reset ---------- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0e14; color: #e0e0e0; height: 100vh; overflow: hidden; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr auto; height: 100vh; gap: 8px; padding: 8px; }
    .section { background: #1a1e26; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .section h2 { font-size: 1.1rem; margin-bottom: 8px; color: #c8aa6e; text-align: center; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    .champion-section { grid-column: 1/2; grid-row: 1/2; }
    .items-section { grid-column: 2/3; grid-row: 1/2; }
    .augments-section { grid-column: 3/4; grid-row: 1/2; }
    .stats-section { grid-column: 1/-1; grid-row: 2/3; }
    .selection-grid { display: flex; flex-wrap: wrap; gap: 6px; overflow-y: auto; align-content: flex-start; flex: 1; min-height: 0; }
    .selection-item { width: 52px; height: 52px; border: 2px solid transparent; border-radius: 6px; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; flex-shrink: 0; }
    .selection-item:hover { border-color: #c8aa6e; }
    .selection-item.selected { border-color: #f0e6d2; background: rgba(200, 170, 110, 0.25); }
    .selection-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
    .tooltip { display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #1e1e24; color: #f0e6d2; padding: 8px 10px; border-radius: 6px; font-size: 0.75rem; white-space: normal; width: 220px; word-wrap: break-word; z-index: 100; pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,0.6); text-align: left; }
    .selection-item:hover .tooltip { display: block; }
    .search-input { width: 100%; padding: 6px 10px; margin-bottom: 8px; background: #2a2e38; border: 1px solid #444; border-radius: 4px; color: #e0e0e0; font-size: 0.9rem; outline: none; }
    .search-input::placeholder { color: #888; }
    .search-input:focus { border-color: #c8aa6e; }
    .stats-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 1.1rem; }
    .stats-table td { padding: 8px 12px; border-bottom: 1px solid #2a2e38; }
    .stats-table td:first-child { font-weight: bold; color: #c8aa6e; width: 40%; }
    .stats-table td:last-child { text-align: right; }
    .level-input-container { display: flex; align-items: center; justify-content: center; margin: 6px 0; }
    .level-input-container input { width: 55px; padding: 4px; background: #2a2e38; border: 1px solid #444; border-radius: 4px; color: #e0e0e0; text-align: center; }
    .selection-grid::-webkit-scrollbar { width: 6px; }
    .selection-grid::-webkit-scrollbar-track { background: #111; border-radius: 3px; }
    .selection-grid::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

    /* ---------- Hotbar styles ---------- */
    .hotbar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      min-height: 40px;
      margin-bottom: 8px;
      padding: 4px;
      background: #0f1219;
      border-radius: 6px;
      align-items: center;
    }
    .hotbar-item {
      width: 36px;
      height: 36px;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s;
    }
    .hotbar-item:hover {
      border-color: #c8aa6e;
    }
    .hotbar-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 3px;
    }
    .hotbar-placeholder {
      color: #666;
      font-size: 0.8rem;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <div class="main-grid">
    
    <!-- CHAMPIONS -->
    <div class="section champion-section">
      <h2>Pick a Champion</h2>
      <input type="text" class="search-input" id="championSearch" placeholder="Search champions…">
      <div class="level-input-container">
        <label for="levelInput">Level:</label>
        <input type="number" id="levelInput" value="1" min="1" max="18">
      </div>
      <div class="selection-grid" id="championGrid"><p style="color:#aaa; text-align:center;">Loading…</p></div>
    </div>

    <!-- ITEMS -->
    <div class="section items-section">
      <h2>Pick Items (max 6)</h2>
      <input type="text" class="search-input" id="itemSearch" placeholder="Search items…">
      <div class="hotbar" id="selectedItemsBar"></div>
      <div class="selection-grid" id="itemGrid"><p style="color:#aaa; text-align:center;">Loading…</p></div>
    </div>

    <!-- AUGMENTS -->
    <div class="section augments-section">
      <h2>Pick Augments (max 6)</h2>
      <input type="text" class="search-input" id="augmentSearch" placeholder="Search augments…">
      <div class="hotbar" id="selectedAugmentsBar"></div>
      <div class="selection-grid" id="augmentGrid"><p style="color:#aaa; text-align:center;">Loading…</p></div>
    </div>

    <!-- FINAL STATS -->
    <div class="section stats-section">
      <h2>Final Stats</h2>
      <table class="stats-table" id="statsTable"><tr><td colspan="2">Select a champion to begin</td></tr></table>
    </div>

  </div>

  <script>
    (function() {
      // ---------- State ----------
      const state = {
        selectedChampion: null,
        selectedItems: new Set(),    // stores item IDs
        selectedAugments: new Set(), // stores augment indices
        level: 1
      };
      const MAX_SELECTIONS = 6;

      // Data
      let championsData = {};
      let itemsData = {};
      let augments = [];
      let ddVersion = '';

      // DOM elements
      const championGrid = document.getElementById('championGrid');
      const itemGrid = document.getElementById('itemGrid');
      const augmentGrid = document.getElementById('augmentGrid');
      const selectedItemsBar = document.getElementById('selectedItemsBar');
      const selectedAugmentsBar = document.getElementById('selectedAugmentsBar');
      const levelInput = document.getElementById('levelInput');
      const statsTable = document.getElementById('statsTable');
      const championSearch = document.getElementById('championSearch');
      const itemSearch = document.getElementById('itemSearch');
      const augmentSearch = document.getElementById('augmentSearch');

      // ---------- Load data ----------
      async function loadData() {
        try {
          const versionsRes = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
          if (!versionsRes.ok) throw new Error('Version fetch failed');
          const versions = await versionsRes.json();
          ddVersion = versions[0];

          const [champsRes, itemsRes] = await Promise.all([
            fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/en_US/champion.json`),
            fetch(`https://ddragon.leagueoflegends.com/cdn/${ddVersion}/data/en_US/item.json`)
          ]);
          if (!champsRes.ok || !itemsRes.ok) throw new Error('Champion/Item data fetch failed');

          const champsJson = await champsRes.json();
          const itemsJson = await itemsRes.json();
          championsData = champsJson.data;
          itemsData = itemsJson.data;

          try {
            const augRes = await fetch('augments.json');
            if (augRes.ok) augments = await augRes.json();
            else throw new Error('File not found');
          } catch (e) {
            console.warn('augments.json missing – using empty list');
            augments = [];
          }

          renderChampions();
          renderItems();
          renderAugments();
          updateSelectedItemsBar();
          updateSelectedAugmentsBar();
          calculateStats();
        } catch (error) {
          console.error('Core data loading error:', error);
          championGrid.innerHTML = '<p style="color:red;">Failed to load champions.</p>';
          itemGrid.innerHTML = '<p style="color:red;">Failed to load items.</p>';
        }
      }

      // ---------- Render functions ----------
      function renderChampions() {
        championGrid.innerHTML = '';
        const champArray = Object.entries(championsData);
        if (champArray.length === 0) {
          championGrid.innerHTML = '<p>No champions found.</p>';
          return;
        }
        champArray.forEach(([key, champ]) => {
          const div = document.createElement('div');
          div.className = 'selection-item';
          div.dataset.championKey = key;
          const img = document.createElement('img');
          img.src = `https://ddragon.leagueoflegends.com/cdn/${ddVersion}/img/champion/${key}.png`;
          img.alt = champ.name;
          img.onerror = () => { img.style.display = 'none'; div.textContent = champ.name.charAt(0); };
          div.appendChild(img);
          if (state.selectedChampion === key) div.classList.add('selected');
          div.addEventListener('click', () => selectChampion(key, div));
          championGrid.appendChild(div);
        });
      }

      function renderItems() {
        itemGrid.innerHTML = '';
        const itemArray = Object.entries(itemsData).filter(([id, item]) => {
          if (!item.gold || !item.gold.total || item.gold.total <= 0) return false;
          if (item.tags && (item.tags.includes('Trinket') || item.tags.includes('Consumable') || item.tags.includes('GoldPer'))) return false;
          return true;
        });
        if (itemArray.length === 0) {
          itemGrid.innerHTML = '<p>No items to display.</p>';
          return;
        }
        itemArray.forEach(([id, item]) => {
          const div = document.createElement('div');
          div.className = 'selection-item';
          div.dataset.itemId = id;
          const img = document.createElement('img');
          img.src = `https://ddragon.leagueoflegends.com/cdn/${ddVersion}/img/item/${id}.png`;
          img.alt = item.name;
          img.onerror = () => { img.style.display = 'none'; div.textContent = item.name.charAt(0); };
          div.appendChild(img);
          if (state.selectedItems.has(id)) div.classList.add('selected');
          div.addEventListener('click', () => toggleItem(id, div));
          itemGrid.appendChild(div);
        });
      }

      function renderAugments() {
        augmentGrid.innerHTML = '';
        if (augments.length === 0) {
          augmentGrid.innerHTML = '<p style="color:orange;">No augment data. Run the scraper to get augments.json.</p>';
          return;
        }
        augments.forEach((aug, index) => {
          const div = document.createElement('div');
          div.className = 'selection-item';
          div.dataset.augmentIndex = index;

          if (aug.icon) {
            const img = document.createElement('img');
            img.src = aug.icon;
            img.alt = aug.name;
            img.onerror = () => { img.remove(); div.textContent = aug.name.charAt(0); div.style.backgroundColor = getColor(index); };
            div.appendChild(img);
          } else {
            div.textContent = aug.name.charAt(0);
            div.style.backgroundColor = getColor(index);
            div.style.display = 'flex';
            div.style.alignItems = 'center';
            div.style.justifyContent = 'center';
            div.style.fontSize = '1.2rem';
            div.style.fontWeight = 'bold';
          }

          const tooltip = document.createElement('span');
          tooltip.className = 'tooltip';
          tooltip.textContent = aug.desc;
          div.appendChild(tooltip);

          if (state.selectedAugments.has(index)) div.classList.add('selected');
          div.addEventListener('click', () => toggleAugment(index, div));

          // Smart tooltip positioning
          div.addEventListener('mouseenter', () => {
            const gridRect = augmentGrid.getBoundingClientRect();
            const iconRect = div.getBoundingClientRect();
            const tooltipWidth = 220;
            let left = iconRect.left + iconRect.width/2 - tooltipWidth/2;
            const padding = 4;
            const minLeft = gridRect.left + padding;
            const maxLeft = gridRect.right - tooltipWidth - padding;
            if (left < minLeft) left = minLeft;
            if (left > maxLeft) left = maxLeft;
            tooltip.style.left = (left - iconRect.left) + 'px';
            tooltip.style.transform = 'none';
          });
          div.addEventListener('mouseleave', () => {
            tooltip.style.left = '50%';
            tooltip.style.transform = 'translateX(-50%)';
          });

          augmentGrid.appendChild(div);
        });
      }

      function getColor(index) {
        return ['#3c5a77','#5e4b3c','#2e5a4b','#6b4e5a','#4a6e5f'][index % 5];
      }

      // ---------- Hotbar updates ----------
      function updateSelectedItemsBar() {
        selectedItemsBar.innerHTML = '';
        if (state.selectedItems.size === 0) {
          selectedItemsBar.innerHTML = '<span class="hotbar-placeholder">No items selected</span>';
          return;
        }
        state.selectedItems.forEach(id => {
          const item = itemsData[id];
          if (!item) return;
          const div = document.createElement('div');
          div.className = 'hotbar-item';
          const img = document.createElement('img');
          img.src = `https://ddragon.leagueoflegends.com/cdn/${ddVersion}/img/item/${id}.png`;
          img.alt = item.name;
          img.title = item.name + ' (click to remove)';
          div.appendChild(img);
          div.addEventListener('click', (e) => {
            e.stopPropagation();
            // Deselect this item
            state.selectedItems.delete(id);
            updateSelectedItemsBar();
            // Update the selection grid highlight
            const gridItem = document.querySelector(`#itemGrid .selection-item[data-item-id="${id}"]`);
            if (gridItem) gridItem.classList.remove('selected');
            calculateStats();
          });
          selectedItemsBar.appendChild(div);
        });
      }

      function updateSelectedAugmentsBar() {
        selectedAugmentsBar.innerHTML = '';
        if (state.selectedAugments.size === 0) {
          selectedAugmentsBar.innerHTML = '<span class="hotbar-placeholder">No augments selected</span>';
          return;
        }
        state.selectedAugments.forEach(index => {
          const aug = augments[index];
          if (!aug) return;
          const div = document.createElement('div');
          div.className = 'hotbar-item';
          // Show icon if available, otherwise fallback letter
          if (aug.icon) {
            const img = document.createElement('img');
            img.src = aug.icon;
            img.alt = aug.name;
            img.title = aug.name + ' (click to remove)';
            div.appendChild(img);
          } else {
            div.style.backgroundColor = getColor(index);
            div.style.display = 'flex';
            div.style.alignItems = 'center';
            div.style.justifyContent = 'center';
            div.style.fontSize = '0.7rem';
            div.style.fontWeight = 'bold';
            div.textContent = aug.name.charAt(0);
            div.title = aug.name + ' (click to remove)';
          }
          div.addEventListener('click', (e) => {
            e.stopPropagation();
            state.selectedAugments.delete(index);
            updateSelectedAugmentsBar();
            const gridItem = document.querySelector(`#augmentGrid .selection-item[data-augment-index="${index}"]`);
            if (gridItem) gridItem.classList.remove('selected');
            calculateStats();
          });
          selectedAugmentsBar.appendChild(div);
        });
      }

      // ---------- Selection handlers ----------
      function selectChampion(key, element) {
        document.querySelectorAll('#championGrid .selection-item.selected').forEach(el => el.classList.remove('selected'));
        state.selectedChampion = key;
        element.classList.add('selected');
        calculateStats();
      }

      function toggleItem(id, element) {
        if (state.selectedItems.has(id)) {
          // Deselect
          state.selectedItems.delete(id);
          element.classList.remove('selected');
        } else {
          // Select – check limit
          if (state.selectedItems.size >= MAX_SELECTIONS) {
            alert(`You can only select up to ${MAX_SELECTIONS} items.`);
            return;
          }
          state.selectedItems.add(id);
          element.classList.add('selected');
        }
        updateSelectedItemsBar();
        calculateStats();
      }

      function toggleAugment(index, element) {
        if (state.selectedAugments.has(index)) {
          state.selectedAugments.delete(index);
          element.classList.remove('selected');
        } else {
          if (state.selectedAugments.size >= MAX_SELECTIONS) {
            alert(`You can only select up to ${MAX_SELECTIONS} augments.`);
            return;
          }
          state.selectedAugments.add(index);
          element.classList.add('selected');
        }
        updateSelectedAugmentsBar();
        calculateStats();
      }

      // ---------- Level input ----------
      levelInput.addEventListener('input', () => {
        state.level = parseInt(levelInput.value) || 1;
        calculateStats();
      });

      // ---------- Search filtering ----------
      championSearch.addEventListener('input', () => {
        const q = championSearch.value.toLowerCase();
        document.querySelectorAll('#championGrid .selection-item').forEach(el => {
          const key = el.dataset.championKey;
          const champ = championsData[key];
          el.style.display = champ && champ.name.toLowerCase().includes(q) ? '' : 'none';
        });
      });
      itemSearch.addEventListener('input', () => {
        const q = itemSearch.value.toLowerCase();
        document.querySelectorAll('#itemGrid .selection-item').forEach(el => {
          const id = el.dataset.itemId;
          const item = itemsData[id];
          el.style.display = item && item.name.toLowerCase().includes(q) ? '' : 'none';
        });
      });
      augmentSearch.addEventListener('input', () => {
        const q = augmentSearch.value.toLowerCase();
        document.querySelectorAll('#augmentGrid .selection-item').forEach(el => {
          const idx = parseInt(el.dataset.augmentIndex);
          const aug = augments[idx];
          el.style.display = aug && aug.name.toLowerCase().includes(q) ? '' : 'none';
        });
      });

      // ---------- Stat calculation ----------
      function getStat(champData, lvl, baseKey, growthKey) {
        const g = lvl - 1;
        return champData.stats[baseKey] + champData.stats[growthKey] * g * (0.7025 + 0.0175 * g);
      }
      function calculateStats() {
        if (!state.selectedChampion || !championsData[state.selectedChampion]) {
          statsTable.innerHTML = '<tr><td colspan="2">Select a champion</td></tr>';
          return;
        }
        const champ = championsData[state.selectedChampion];
        const lvl = state.level;
        const base = {
          health: getStat(champ, lvl, 'hp', 'hpperlevel'),
          mana: getStat(champ, lvl, 'mp', 'mpperlevel'),
          armor: getStat(champ, lvl, 'armor', 'armorperlevel'),
          magicResistance: getStat(champ, lvl, 'spellblock', 'spellblockperlevel'),
          attackDamage: getStat(champ, lvl, 'attackdamage', 'attackdamageperlevel'),
          abilityPower: 0
        };
        const itemBonuses = { health:0, mana:0, armor:0, magicResistance:0, attackDamage:0, abilityPower:0 };
        state.selectedItems.forEach(id => {
          const item = itemsData[id];
          if (!item?.stats) return;
          const map = { FlatHPPoolMod:'health', FlatMPPoolMod:'mana', FlatArmorMod:'armor', FlatSpellBlockMod:'magicResistance', FlatPhysicalDamageMod:'attackDamage', FlatMagicDamageMod:'abilityPower' };
          for (const [sk, val] of Object.entries(item.stats)) if (map[sk]) itemBonuses[map[sk]] += val;
        });
        const augBonuses = { health:0, mana:0, armor:0, magicResistance:0, attackDamage:0, abilityPower:0, adaptiveForce:0 };
        state.selectedAugments.forEach(idx => {
          const aug = augments[idx];
          if (aug?.effects) for (const [k,v] of Object.entries(aug.effects)) if (augBonuses.hasOwnProperty(k)) augBonuses[k] += v;
        });
        let ad = itemBonuses.attackDamage + augBonuses.attackDamage;
        let ap = itemBonuses.abilityPower + augBonuses.abilityPower;
        const adapt = augBonuses.adaptiveForce;
        if (ad > ap) ad += adapt; else ap += adapt;

        const totals = {
          'Health': Math.round(base.health + itemBonuses.health + augBonuses.health),
          'Mana': Math.round(base.mana + itemBonuses.mana + augBonuses.mana),
          'Armor': Math.round(base.armor + itemBonuses.armor + augBonuses.armor),
          'Magic Resist': Math.round(base.magicResistance + itemBonuses.magicResistance + augBonuses.magicResistance),
          'Attack Damage': Math.round(base.attackDamage + ad),
          'Ability Power': Math.round(base.abilityPower + ap)
        };
        statsTable.innerHTML = Object.entries(totals).map(([n,v]) => `<tr><td>${n}</td><td>${v}</td></tr>`).join('');
      }

      // Start
      loadData();
    })();
  </script>
</body>
</html>
